
<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>Mini Business Intelligence - Comedor Pedagógico</title>
<p style="text-align:center;color:white;">
Panel de análisis de ventas del comedor pedagógico
</p>

<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>


<style>

body{
font-family: 'Segoe UI', Arial;
margin:40px;
background:linear-gradient(135deg,#1e3c72,#2a5298);
color:#333;
}

h1{
text-align:center;
color:white;
margin-bottom:30px;
}

h2{
margin-top:40px;
}

.kpis{
display:flex;
gap:20px;
flex-wrap:wrap;
margin-bottom:20px;
}

.kpi{
background:white;
padding:20px;
border-radius:12px;
box-shadow:0 8px 20px rgba(0,0,0,0.15);
flex:1;
min-width:200px;
text-align:center;
transition:0.3s;
}

.kpi:hover{
transform:translateY(-5px);
}

table{
border-collapse:collapse;
width:100%;
background:white;
border-radius:10px;
overflow:hidden;
box-shadow:0 5px 15px rgba(0,0,0,0.1);
}

th{
background:#2a5298;
color:white;
}

th,td{
padding:10px;
}

tr:nth-child(even){
background:#f2f2f2;
}

canvas{
background:white;
padding:20px;
margin-top:30px;
border-radius:10px;
box-shadow:0 5px 15px rgba(0,0,0,0.1);
}

button{
background:#2a5298;
color:white;
border:none;
padding:12px 20px;
border-radius:8px;
font-size:16px;
cursor:pointer;
}

button:hover{
background:#1e3c72;
}

</style>

</head>

<body>

<h1>📊 Business Intelligence - Comedor Pedagógico</h1>

<p>
Filas antes limpieza: <b id="rawCount"></b> |
Filas después limpieza: <b id="cleanCount"></b>
</p>

<div class="kpis">

<div class="kpi">
<h3>Ventas Totales (€)</h3>
<p id="ventasTotales"></p>
</div>

<div class="kpi">
<h3>Unidades Totales</h3>
<p id="unidadesTotales"></p>
</div>

</div>

<h2>Top 5 productos</h2>
<canvas id="topProductos"></canvas>

<h2>Ventas por franja</h2>
<canvas id="ventasFranja"></canvas>

<h2>Ventas por familia</h2>
<canvas id="ventasFamilia"></canvas>

<h2>Primeras 10 filas RAW</h2>
<table id="tablaRaw"></table>

<h2>Primeras 10 filas LIMPIAS</h2>
<table id="tablaClean"></table>

<br>

<button onclick="descargarCSV()">Descargar CSV limpio</button>

<script src="app.js"></script>

</body>
</html>
