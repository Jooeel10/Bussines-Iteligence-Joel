
<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>Mini Business Intelligence - Comedor Pedagógico</title>

<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

<style>
body{
font-family: Arial;
margin:40px;
background:#f5f5f5;
}

h1{
text-align:center;
}

.kpis{
display:flex;
gap:20px;
flex-wrap:wrap;
}

.kpi{
background:white;
padding:20px;
border-radius:10px;
box-shadow:0 2px 5px rgba(0,0,0,0.1);
flex:1;
min-width:200px;
}

table{
border-collapse:collapse;
width:100%;
background:white;
margin-top:20px;
}

th,td{
border:1px solid #ddd;
padding:8px;
text-align:left;
}

canvas{
background:white;
padding:20px;
margin-top:30px;
border-radius:10px;
}
</style>
</head>

<body>

<h1>📊 Business Intelligence - Comedor Pedagógico</h1>

<p>
Filas antes limpieza: <b id="rawCount"></b> |
Filas después limpieza: <b id="cleanCount"></b>
</p>

<div class="kpis">

<div class="kpi">
<h3>Ventas Totales (€)</h3>
<p id="ventasTotales"></p>
</div>

<div class="kpi">
<h3>Unidades Totales</h3>
<p id="unidadesTotales"></p>
</div>

</div>

<h2>Top 5 productos</h2>
<canvas id="topProductos"></canvas>

<h2>Ventas por franja</h2>
<canvas id="ventasFranja"></canvas>

<h2>Ventas por familia</h2>
<canvas id="ventasFamilia"></canvas>

<h2>Primeras 10 filas RAW</h2>
<table id="tablaRaw"></table>

<h2>Primeras 10 filas LIMPIAS</h2>
<table id="tablaClean"></table>

<br>

<button onclick="descargarCSV()">Descargar CSV limpio</button>

<script src="app.js"></script>

</body>
</html>
